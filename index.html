<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sistema Sofisticatto</title>

  <script src="https://unpkg.com/@supabase/supabase-js@2.48.0/dist/umd/supabase.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      margin: 0;
    }

    header {
      text-align: center;
      padding: 20px;
      background: #fff;
      border-bottom: 1px solid #ddd;
    }

    .logo {
      font-size: 24px;
      color: #6a1b9a;
      font-weight: bold;
    }

    .container {
      max-width: 900px;
      margin: 20px auto;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
    }

    button {
      margin-top: 10px;
      padding: 8px 15px;
      border: none;
      background: #6a1b9a;
      color: white;
      cursor: pointer;
      border-radius: 4px;
    }

    .secondary {
      background: #777;
    }

    .hidden {
      display: none;
    }

    table {
      width: 100%;
      margin-top: 10px;
      border-collapse: collapse;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 6px;
    }

    .msg {
      margin-top: 10px;
      color: red;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">Sofisticatto</div>
  <div>Sistema de Produtos</div>
</header>

<!-- LOGIN -->
<div class="container" id="login-section">
  <h2>Login</h2>
  <input id="login-username" placeholder="Usuário">
  <input id="login-password" type="password" placeholder="Senha">
  <button id="btn-login">Entrar</button>
  <div id="login-msg" class="msg"></div>
</div>

<!-- MENU -->
<div class="container hidden" id="menu-section">
  <h2>Menu</h2>
  <p id="user-info"></p>

  <button onclick="irPara('consulta-section')">📦 Consulta</button>
  <button onclick="irPara('cadastro-produto-section')">➕ Cadastro</button>
  <button onclick="logout()" class="secondary">🚪 Sair</button>
</div>

<!-- CONSULTA -->
<div class="container hidden" id="consulta-section">
  <h2>Consulta</h2>
  <button onclick="irPara('menu-section')">⬅️ Voltar</button>

  <button id="btn-consultar">Buscar produtos</button>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Código</th>
        <th>Descrição</th>
      </tr>
    </thead>
    <tbody id="tabela-produtos"></tbody>
  </table>
</div>

<!-- CADASTRO -->
<div class="container hidden" id="cadastro-produto-section">
  <h2>Cadastro</h2>
  <button onclick="irPara('menu-section')">⬅️ Voltar</button>

  <input id="produto-codigo" placeholder="Código">
  <input id="produto-descricao" placeholder="Descrição">

  <button id="btn-salvar-produto">Salvar</button>
</div>

<script>
const { createClient } = supabase;

const supa = createClient(
  "https://gymyltthcegplqzbujrv.supabase.co",
  "sb_publishable_yiTEjwaD0gPFz3nHb22bJQ_kTa-DWjS"
);

let usuarioLogado = null;

// NAVEGAÇÃO
function irPara(secao) {
  ["login-section","menu-section","consulta-section","cadastro-produto-section"]
    .forEach(s => document.getElementById(s).classList.add("hidden"));

  document.getElementById(secao).classList.remove("hidden");
}

// LOGIN (SEM SUPABASE - FUNCIONA CERTO)
document.getElementById("btn-login").onclick = () => {
  const user = document.getElementById("login-username").value;
  const pass = document.getElementById("login-password").value;

  if (user === "admin" && pass === "123") {
    usuarioLogado = { username: "admin" };

    document.getElementById("user-info").textContent =
      "Logado como: admin";

    irPara("menu-section");
  } else {
    document.getElementById("login-msg").textContent =
      "Usuário ou senha inválidos";
  }
};

// LOGOUT
function logout() {
  usuarioLogado = null;
  irPara("login-section");
}

// CONSULTA (SUPABASE)
document.getElementById("btn-consultar").onclick = async () => {
  const { data, error } = await supa.from("produtos").select("*");

  if (error) {
    alert("Erro ao buscar produtos");
    console.error(error);
    return;
  }

  const tabela = document.getElementById("tabela-produtos");
  tabela.innerHTML = "";

  data.forEach(p => {
    tabela.innerHTML += `
      <tr>
        <td>${p.id}</td>
        <td>${p.codigo}</td>
        <td>${p.descricao}</td>
      </tr>`;
  });
};

// SALVAR PRODUTO
document.getElementById("btn-salvar-produto").onclick = async () => {
  const codigo = document.getElementById("produto-codigo").value;
  const descricao = document.getElementById("produto-descricao").value;

  const { error } = await supa.from("produtos").insert({
    codigo,
    descricao
  });

  if (error) {
    alert("Erro ao salvar");
    console.error(error);
    return;
  }

  alert("Produto salvo!");
};
</script>

</body>
</html>
