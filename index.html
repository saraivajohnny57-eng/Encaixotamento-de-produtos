<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Sofisticatto</title>

<!-- 🔥 PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#6a1b9a">

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body { margin:0; font-family: Arial; background:#f4f6f9; display:flex; }

.sidebar {
  width:220px; background:#6a1b9a; color:white;
  height:100vh; padding:20px; display:none;
}

.sidebar button {
  width:100%; margin-top:10px; background:#8e24aa;
  color:white; border:none; padding:10px; border-radius:4px;
}

/* BOTÃO INSTALAR */
#btn-instalar {
  background:#2e7d32;
  font-weight:bold;
}

.main { flex:1; padding:20px; }

.card {
  background:white; padding:20px; border-radius:8px;
}

input, select {
  width:100%; padding:10px; margin-top:8px;
  border:1px solid #ccc; border-radius:4px;
}

button { margin-top:10px; padding:10px; cursor:pointer; }

.hidden { display:none; }

table { width:100%; margin-top:10px; border-collapse:collapse; }

td, th { border:1px solid #ddd; padding:8px; }

th { background:#6a1b9a; color:white; }

.resultado { margin-top:15px; font-weight:bold; color:#2e7d32; }

@media (max-width:768px) {
  body { flex-direction:column; }
  .sidebar { width:100%; height:auto; }
  .sidebar button { width:45%; margin:5px; }
  .main { padding:10px; }
  table { font-size:12px; }
}
</style>
</head>

<body>

<div class="sidebar" id="menu">
  <h2>Sofisticatto</h2>
  <p id="user-info"></p>

  <button onclick="irPara('consulta')">Consulta</button>
  <button onclick="irPara('cadastro')">Cadastro</button>
  <button id="btn-usuarios" onclick="irPara('usuarios')" style="display:none;">Usuários</button>

  <!-- 🔥 BOTÃO INSTALAR -->
  <button id="btn-instalar" style="display:none;">📲 Instalar App</button>

  <button onclick="logout()">Sair</button>
</div>

<div class="main">

<div id="login" class="card">
  <h2>Login</h2>
  <input id="login-username" placeholder="Usuário">
  <input id="login-password" type="password" placeholder="Senha">
  <button onclick="login()">Entrar</button>
</div>

<div id="consulta" class="card hidden">
  <h2>Consulta</h2>

  <input id="busca" placeholder="Código">
  <input id="quantidade" placeholder="Quantidade">

  <button onclick="buscar()">Buscar</button>
  <button onclick="calcular()">Calcular</button>

  <table>
    <thead>
      <tr>
        <th>Código</th>
        <th>Descrição</th>
        <th>Nº Caixa</th>
        <th>Qtde/Caixa</th>
      </tr>
    </thead>
    <tbody id="tabela"></tbody>
  </table>

  <div id="resultado-calculo" class="resultado"></div>
</div>

<div id="cadastro" class="card hidden">
  <h2>Cadastro de Produto</h2>

  <input id="produto-id" type="hidden">
  <input id="codigo" placeholder="Código">
  <input id="descricao" placeholder="Descrição">
  <input id="numero_caixa" placeholder="Número da Caixa">
  <input id="qtde_caixa" placeholder="Qtde por Caixa">

  <button onclick="salvar()">Salvar</button>
  <button onclick="limpar()">Novo</button>

  <h3>Lista de Produtos</h3>
  <table>
    <tbody id="lista-produtos"></tbody>
  </table>
</div>

<div id="usuarios" class="card hidden">
  <h2>Usuários</h2>

  <input id="usuario-id" type="hidden">
  <input id="novo-user" placeholder="Usuário">
  <input id="nova-senha" placeholder="Senha">

  <select id="role">
    <option value="user">Usuário</option>
    <option value="admin">Admin</option>
  </select>

  <button onclick="salvarUsuario()">Salvar</button>
  <button onclick="limparUsuario()">Novo</button>

  <h3>Lista de Usuários</h3>
  <table>
    <tbody id="lista-usuarios"></tbody>
  </table>
</div>

</div>

<script>

// 🔥 SERVICE WORKER
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/service-worker.js");
}

const supa = supabase.createClient(
  "https://gymyltthcegplqzbujrv.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
);

let usuarioLogado = null;

function irPara(secao) {
  if (!usuarioLogado) return;

  ["consulta","cadastro","usuarios"].forEach(s =>
    document.getElementById(s).classList.add("hidden")
  );

  document.getElementById(secao).classList.remove("hidden");

  if (secao === "cadastro") carregarLista();
  if (secao === "usuarios") carregarUsuarios();
}

async function login() {
  const user = document.getElementById("login-username").value;
  const pass = document.getElementById("login-password").value;

  const { data } = await supa
    .from("usuarios")
    .select("*")
    .eq("username", user)
    .eq("senha", pass)
    .maybeSingle();

  if (!data) return alert("Login inválido");

  usuarioLogado = data;

  document.getElementById("login").classList.add("hidden");
  document.getElementById("menu").style.display = "block";

  document.getElementById("user-info").textContent =
    "Logado: " + data.username;

  if (data.role === "admin") {
    document.getElementById("btn-usuarios").style.display = "block";
  }
}

function logout() {
  location.reload();
}

/* ===== SEU SISTEMA CONTINUA IGUAL ===== */
/* (buscar, salvar, editar, etc — não mexi) */

/* ===== BOTÃO INSTALAR APP ===== */

let deferredPrompt;
const btnInstalar = document.getElementById("btn-instalar");

function isMobile() {
  return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
}

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;

  if (isMobile()) {
    btnInstalar.style.display = "block";
  }
});

btnInstalar.addEventListener("click", async () => {
  if (!deferredPrompt) return;

  deferredPrompt.prompt();
  await deferredPrompt.userChoice;

  btnInstalar.style.display = "none";
});

</script>

</body>
</html>
