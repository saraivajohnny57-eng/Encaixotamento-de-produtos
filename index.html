<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema Sofisticatto</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; background:#f5f5f5; margin:0; }
.container { max-width:800px; margin:30px auto; background:#fff; padding:20px; border-radius:8px; }
.hidden { display:none; }
button { padding:8px 15px; background:#6a1b9a; color:#fff; border:none; cursor:pointer; }
.msg { color:red; margin-top:10px; }
</style>
</head>

<body>

<div class="container" id="login">
<h2>Login</h2>
<input id="user" placeholder="Usuário"><br><br>
<input id="pass" type="password" placeholder="Senha"><br><br>
<button onclick="login()">Entrar</button>
<div id="msg" class="msg"></div>
</div>

<div class="container hidden" id="menu">
<h2>Menu</h2>
<p id="info"></p>
<button onclick="logout()">Sair</button>
</div>

<script>
const supa = supabase.createClient(
"https://gymyltthcegplqzbujrv.supabase.co",
"sb_publishable_yiTEjwaD0gPFz3nHb22bJQ_kTa-DWjS"
);

let userLogado = null;

async function login() {
  const user = document.getElementById("user").value.trim();
  const pass = document.getElementById("pass").value.trim();
  const msg = document.getElementById("msg");

  msg.textContent = "";

  try {
    const { data, error } = await supa
      .from("usuarios")
      .select("*")
      .eq("username", user)
      .maybeSingle();

    if (error || !data) {
      msg.textContent = "Usuário não encontrado";
      return;
    }

    if (String(data.senha) !== String(pass)) {
      msg.textContent = "Senha incorreta";
      return;
    }

    userLogado = data;

    document.getElementById("login").classList.add("hidden");
    document.getElementById("menu").classList.remove("hidden");

    document.getElementById("info").textContent =
      "Logado como: " + data.username;

  } catch (e) {
    console.error(e);
    msg.textContent = "Erro geral no sistema";
  }
}

function logout() {
  userLogado = null;
  document.getElementById("login").classList.remove("hidden");
  document.getElementById("menu").classList.add("hidden");
}
</script>

</body>
</html>
