<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Sistema Sofisticatto</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2.48.0/dist/umd/supabase.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
    }
    header {
      text-align: center;
      padding: 20px 10px;
      background: #ffffff;
      border-bottom: 1px solid #ddd;
    }
    .logo {
      font-size: 24px;
      font-weight: bold;
      color: #6a1b9a;
    }
    .subtitulo {
      font-size: 14px;
      color: #555;
    }
    .container {
      max-width: 900px;
      margin: 20px auto;
      background: #ffffff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }
    h2 {
      margin-top: 0;
    }
    label {
      display: block;
      margin-top: 10px;
      font-size: 14px;
    }
    input, select {
      width: 100%;
      padding: 8px;
      margin-top: 4px;
      border-radius: 4px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }
    button {
      margin-top: 12px;
      padding: 8px 16px;
      border-radius: 4px;
      border: none;
      background: #6a1b9a;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
    }
    button.secondary {
      background: #777;
    }
    button.danger {
      background: #c62828;
    }
    .hidden {
      display: none;
    }
    .menu-buttons button {
      margin-right: 8px;
      margin-bottom: 8px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      font-size: 14px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 6px 8px;
      text-align: left;
    }
    th {
      background: #f0f0f0;
    }
    .msg {
      margin-top: 10px;
      font-size: 13px;
      color: #c62828;
    }
    .msg.ok {
      color: #2e7d32;
    }
  </style>
</head>
<body>
  <header>
    <!-- Aqui você pode trocar por <img src="logo.png" class="logo-img"> se tiver a imagem -->
    <div class="logo">Sofisticatto</div>
    <div class="subtitulo">Sistema de Consulta e Cadastro de Produtos</div>
  </header>

  <div class="container" id="login-section">
    <h2>Login</h2>
    <label>Usuário</label>
    <input type="text" id="login-username" />
    <label>Senha</label>
    <input type="password" id="login-password" />
    <button id="btn-login">Entrar</button>
    <div class="msg" id="login-msg"></div>
  </div>

  <div class="container hidden" id="menu-section">
    <h2>Menu</h2>
    <p id="user-info"></p>
    <div class="menu-buttons">
      <button id="btn-menu-consulta">Consulta de Produtos</button>
      <button id="btn-menu-cadastro-produto">Cadastro de Produtos</button>
      <button id="btn-menu-usuarios" class="secondary">Cadastro de Usuários (Admin)</button>
      <button id="btn-logout" class="secondary">Sair</button>
    </div>
  </div>

  <div class="container hidden" id="consulta-section">
    <h2>Consulta de Produtos</h2>
    <label>Buscar por código ou descrição</label>
    <input type="text" id="consulta-busca" placeholder="Digite parte do código ou descrição" />
    <button id="btn-consultar">Buscar</button>
    <table id="tabela-produtos">
      <thead>
        <tr>
          <th>ID</th>
          <th>Código</th>
          <th>Descrição</th>
          <th>Nº Caixa</th>
          <th>Qtd/Caixa</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <div class="msg" id="consulta-msg"></div>
  </div>

  <div class="container hidden" id="cadastro-produto-section">
    <h2>Cadastro / Edição de Produto</h2>
    <input type="hidden" id="produto-id" />
    <label>Código</label>
    <input type="text" id="produto-codigo" />
    <label>Descrição</label>
    <input type="text" id="produto-descricao" />
    <label>Número da Caixa</label>
    <input type="text" id="produto-numero-caixa" />
    <label>Quantidade por Caixa</label>
    <input type="number" id="produto-quantidade-caixa" />
    <button id="btn-salvar-produto">Salvar</button>
    <button id="btn-novo-produto" class="secondary">Novo</button>
    <div class="msg" id="cadastro-produto-msg"></div>
  </div>

  <div class="container hidden" id="usuarios-section">
    <h2>Cadastro de Usuários (Admin)</h2>
    <label>Usuário</label>
    <input type="text" id="usuario-username" />
    <label>Senha</label>
    <input type="password" id="usuario-senha" />
    <label>Nível de acesso</label>
    <select id="usuario-role">
      <option value="user">Usuário comum</option>
      <option value="admin">Administrador</option>
    </select>
    <button id="btn-criar-usuario">Criar Usuário</button>
    <div class="msg" id="usuarios-msg"></div>
  </div>

  <script>
    // CONFIGURAÇÃO DO SUPABASE
    const SUPABASE_URL = "https://gymyltthcegplqzbujrv.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_yiTEjwaD0gPFz3nHb22bJQ_kTa-DWjS";

    const { createClient } = supabase;
    const supa = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let usuarioLogado = null; // { id, username, role }

    // UTIL: mostrar/ocultar seções
    function showSection(id) {
      const sections = [
        "login-section",
        "menu-section",
        "consulta-section",
        "cadastro-produto-section",
        "usuarios-section"
      ];
      sections.forEach(sec => {
        document.getElementById(sec).classList.add("hidden");
      });
      document.getElementById(id).classList.remove("hidden");
    }

    // LOGIN
    document.getElementById("btn-login").addEventListener("click", async () => {
      const username = document.getElementById("login-username").value.trim();
      const password = document.getElementById("login-password").value.trim();
      const msg = document.getElementById("login-msg");
      msg.textContent = "";

      if (!username || !password) {
        msg.textContent = "Preencha usuário e senha.";
        return;
      }

      // ATENÇÃO: aqui está simples (senha em texto). Em produção, o ideal é usar hash.
      const { data, error } = await supa
        .from("usuarios")
        .select("id, username, role, senha")
        .eq("username", username)
        .eq("senha", password)
        .maybeSingle();

      if (error) {
        console.error(error);
        msg.textContent = "Erro ao tentar logar.";
        return;
      }

      if (!data) {
        msg.textContent = "Usuário ou senha inválidos.";
        return;
      }

      usuarioLogado = {
        id: data.id,
        username: data.username,
        role: data.role
      };

      document.getElementById("user-info").textContent =
        "Logado como: " + data.username + " (" + data.role + ")";

      // Se não for admin, esconde botão de usuários
      document.getElementById("btn-menu-usuarios").style.display =
        data.role === "admin" ? "inline-block" : "none";

      showSection("menu-section");
      document.getElementById("login-password").value = "";
    });

    // LOGOUT
    document.getElementById("btn-logout").addEventListener("click", () => {
      usuarioLogado = null;
      document.getElementById("login-username").value = "";
      document.getElementById("login-password").value = "";
      document.getElementById("login-msg").textContent = "";
      showSection("login-section");
    });

    // MENU → CONSULTA
    document.getElementById("btn-menu-consulta").addEventListener("click", () => {
      if (!usuarioLogado) return;
      document.getElementById("consulta-busca").value = "";
      document.querySelector("#tabela-produtos tbody").innerHTML = "";
      document.getElementById("consulta-msg").textContent = "";
      showSection("consulta-section");
    });

    // MENU → CADASTRO PRODUTO
    document.getElementById("btn-menu-cadastro-produto").addEventListener("click", () => {
      if (!usuarioLogado) return;
      limparFormularioProduto();
      document.getElementById("cadastro-produto-msg").textContent = "";
      showSection("cadastro-produto-section");
    });

    // MENU → USUÁRIOS (ADMIN)
    document.getElementById("btn-menu-usuarios").addEventListener("click", () => {
      if (!usuarioLogado || usuarioLogado.role !== "admin") return;
      document.getElementById("usuarios-msg").textContent = "";
      document.getElementById("usuario-username").value = "";
      document.getElementById("usuario-senha").value = "";
      document.getElementById("usuario-role").value = "user";
      showSection("usuarios-section");
    });

    // CONSULTA DE PRODUTOS
    document.getElementById("btn-consultar").addEventListener("click", async () => {
      if (!usuarioLogado) return;
      const termo = document.getElementById("consulta-busca").value.trim();
      const msg = document.getElementById("consulta-msg");
      msg.textContent = "";

      let query = supa.from("produtos").select("*").order("id", { ascending: true });

      if (termo) {
        query = query.or(`codigo.ilike.%${termo}%,descricao.ilike.%${termo}%`);
      }

      const { data, error } = await query;

      if (error) {
        console.error(error);
        msg.textContent = "Erro ao consultar produtos.";
        return;
      }

      const tbody = document.querySelector("#tabela-produtos tbody");
      tbody.innerHTML = "";

      if (!data || data.length === 0) {
        msg.textContent = "Nenhum produto encontrado.";
        return;
      }

      data.forEach(prod => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${prod.id}</td>
          <td>${prod.codigo || ""}</td>
          <td>${prod.descricao || ""}</td>
          <td>${prod.numero_caixa || ""}</td>
          <td>${prod.quantidade_caixa || ""}</td>
          <td>
            <button data-id="${prod.id}" class="btn-editar">Editar</button>
            <button data-id="${prod.id}" class="btn-excluir danger">Excluir</button>
          </td>
        `;
        tbody.appendChild(tr);
      });

      // Ações de editar/excluir
      tbody.querySelectorAll(".btn-editar").forEach(btn => {
        btn.addEventListener("click", () => {
          const id = btn.getAttribute("data-id");
          carregarProdutoParaEdicao(id);
        });
      });

      tbody.querySelectorAll(".btn-excluir").forEach(btn => {
        btn.addEventListener("click", () => {
          const id = btn.getAttribute("data-id");
          excluirProduto(id);
        });
      });
    });

    async function carregarProdutoParaEdicao(id) {
      if (!usuarioLogado) return;
      const { data, error } = await supa
        .from("produtos")
        .select("*")
        .eq("id", id)
        .maybeSingle();

      if (error || !data) {
        alert("Erro ao carregar produto.");
        return;
      }

      document.getElementById("produto-id").value = data.id;
      document.getElementById("produto-codigo").value = data.codigo || "";
      document.getElementById("produto-descricao").value = data.descricao || "";
      document.getElementById("produto-numero-caixa").value = data.numero_caixa || "";
      document.getElementById("produto-quantidade-caixa").value = data.quantidade_caixa || "";
      document.getElementById("cadastro-produto-msg").textContent = "";
      showSection("cadastro-produto-section");
    }

    async function excluirProduto(id) {
      if (!usuarioLogado) return;
      if (!confirm("Tem certeza que deseja excluir este produto?")) return;

      const { error } = await supa
        .from("produtos")
        .delete()
        .eq("id", id);

      if (error) {
        alert("Erro ao excluir produto.");
        return;
      }

      alert("Produto excluído com sucesso.");
      // Atualiza consulta
      document.getElementById("btn-consultar").click();
    }

    function limparFormularioProduto() {
      document.getElementById("produto-id").value = "";
      document.getElementById("produto-codigo").value = "";
      document.getElementById("produto-descricao").value = "";
      document.getElementById("produto-numero-caixa").value = "";
      document.getElementById("produto-quantidade-caixa").value = "";
    }

    // SALVAR PRODUTO (novo ou edição)
    document.getElementById("btn-salvar-produto").addEventListener("click", async () => {
      if (!usuarioLogado) return;
      const id = document.getElementById("produto-id").value;
      const codigo = document.getElementById("produto-codigo").value.trim();
      const descricao = document.getElementById("produto-descricao").value.trim();
      const numero_caixa = document.getElementById("produto-numero-caixa").value.trim();
      const quantidade_caixa = document.getElementById("produto-quantidade-caixa").value;
      const msg = document.getElementById("cadastro-produto-msg");
      msg.textContent = "";

      if (!codigo || !descricao) {
        msg.textContent = "Código e descrição são obrigatórios.";
        return;
      }

      const payload = {
        codigo,
        descricao,
        numero_caixa,
        quantidade_caixa: quantidade_caixa ? Number(quantidade_caixa) : null
      };

      let result;
      if (id) {
        result = await supa
          .from("produtos")
          .update(payload)
          .eq("id", id);
      } else {
        result = await supa
          .from("produtos")
          .insert(payload);
      }

      if (result.error) {
        console.error(result.error);
        msg.textContent = "Erro ao salvar produto.";
        return;
      }

      msg.classList.add("ok");
      msg.textContent = "Produto salvo com sucesso.";
      limparFormularioProduto();
    });

    document.getElementById("btn-novo-produto").addEventListener("click", () => {
      limparFormularioProduto();
      document.getElementById("cadastro-produto-msg").textContent = "";
    });

    // CADASTRO DE USUÁRIOS (ADMIN)
    document.getElementById("btn-criar-usuario").addEventListener("click", async () => {
      if (!usuarioLogado || usuarioLogado.role !== "admin") return;

      const username = document.getElementById("usuario-username").value.trim();
      const senha = document.getElementById("usuario-senha").value.trim();
      const role = document.getElementById("usuario-role").value;
      const msg = document.getElementById("usuarios-msg");
      msg.textContent = "";

      if (!username || !senha) {
        msg.textContent = "Usuário e senha são obrigatórios.";
        return;
      }

      const { data: existente, error: errCheck } = await supa
        .from("usuarios")
        .select("id")
        .eq("username", username)
        .maybeSingle();

      if (errCheck) {
        console.error(errCheck);
        msg.textContent = "Erro ao verificar usuário.";
        return;
      }

      if (existente) {
        msg.textContent = "Já existe um usuário com esse nome.";
        return;
      }

      const { error } = await supa
        .from("usuarios")
        .insert({
          username,
          senha,
          role
        });

      if (error) {
        console.error(error);
        msg.textContent = "Erro ao criar usuário.";
        return;
      }

      msg.classList.add("ok");
      msg.textContent = "Usuário criado com sucesso.";
      document.getElementById("usuario-username").value = "";
      document.getElementById("usuario-senha").value = "";
      document.getElementById("usuario-role").value = "user";
    });

    // AO CARREGAR A PÁGINA
    showSection("login-section");
  </script>
</body>
</html>
