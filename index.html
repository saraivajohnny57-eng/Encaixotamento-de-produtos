<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema Sofisticatto</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f4f6f9;
  display:flex;
}

/* MENU LATERAL */
.sidebar {
  width:220px;
  background:#6a1b9a;
  color:white;
  height:100vh;
  padding:20px;
}

.sidebar h2 {
  text-align:center;
}

.sidebar button {
  width:100%;
  margin-top:10px;
  background:#8e24aa;
}

.sidebar button:hover {
  background:#ab47bc;
}

/* CONTEÚDO */
.main {
  flex:1;
  padding:20px;
}

.card {
  background:white;
  padding:20px;
  border-radius:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:1px solid #ccc;
  border-radius:4px;
}

button {
  padding:10px 15px;
  border:none;
  border-radius:4px;
  cursor:pointer;
  color:white;
}

.primary { background:#6a1b9a; }
.secondary { background:#777; }

/* TABELA */
table {
  width:100%;
  margin-top:15px;
  border-collapse:collapse;
}

th {
  background:#6a1b9a;
  color:white;
}

td, th {
  padding:10px;
  border:1px solid #ddd;
}

/* ESCONDER */
.hidden { display:none; }
</style>
</head>

<body>

<!-- MENU -->
<div class="sidebar hidden" id="menu">
  <h2>Sofisticatto</h2>
  <p id="user-info"></p>

  <button onclick="irPara('consulta')">📦 Consulta</button>
  <button onclick="irPara('cadastro')">➕ Cadastro</button>
  <button onclick="logout()">🚪 Sair</button>
</div>

<!-- CONTEÚDO -->
<div class="main">

<!-- LOGIN -->
<div id="login" class="card">
  <h2>Login</h2>
  <input id="login-username" placeholder="Usuário">
  <input id="login-password" type="password" placeholder="Senha">
  <button class="primary" onclick="login()">Entrar</button>
</div>

<!-- CONSULTA -->
<div id="consulta" class="card hidden">
  <h2>Consulta de Produtos</h2>

  <input id="busca" placeholder="Código">
  <button class="primary" onclick="buscar()">Buscar</button>

  <table>
    <thead>
      <tr>
        <th>Código</th>
        <th>Descrição</th>
        <th>Nº Caixa</th>
        <th>Qtde</th>
      </tr>
    </thead>
    <tbody id="tabela"></tbody>
  </table>
</div>

<!-- CADASTRO -->
<div id="cadastro" class="card hidden">
  <h2>Cadastro de Produto</h2>

  <input id="codigo" placeholder="Código">
  <input id="descricao" placeholder="Descrição">
  <input id="numero_caixa" placeholder="Número da Caixa">
  <input id="qtde_caixa" placeholder="Qtde por Caixa">

  <button class="primary" onclick="salvar()">Salvar</button>
</div>

</div>

<script>
const supa = supabase.createClient(
  "https://gymyltthcegplqzbujrv.supabase.co",
  "sb_publishable_yiTEjwaD0gPFz3nHb22bJQ_kTa-DWjS"
);

let usuarioLogado = null;

function irPara(secao) {
  ["consulta","cadastro"].forEach(s => document.getElementById(s).classList.add("hidden"));
  document.getElementById(secao).classList.remove("hidden");
}

async function login() {
  const user = login-username.value;
  const pass = login-password.value;

  const { data } = await supa
    .from("usuarios")
    .select("*")
    .ilike("username", user)
    .eq("senha", pass)
    .maybeSingle();

  if (!data) {
    alert("Login inválido");
    return;
  }

  usuarioLogado = data;

  document.getElementById("login").classList.add("hidden");
  document.getElementById("menu").classList.remove("hidden");

  document.getElementById("user-info").textContent =
  👤 ${data.username};
}

function logout() {
  location.reload();
}

async function buscar() {
  const codigo = busca.value;

  const { data } = await supa
    .from("produtos")
    .select("*")
    .eq("codigo", codigo);

  tabela.innerHTML = "";

  data.forEach(p => {
    tabela.innerHTML += `
      <tr>
        <td>${p.codigo}</td>
        <td>${p.descricao}</td>
        <td>${p.numero_caixa}</td>
        <td>${p.qtde_caixa}</td>
      </tr>`;
  });
}

async function salvar() {
  const { error } = await supa.from("produtos").insert({
    codigo: codigo.value,
    descricao: descricao.value,
    numero_caixa: numero_caixa.value,
    qtde_caixa: qtde_caixa.value
  });

  if (error) {
    alert("Erro ao salvar");
    return;
  }

  alert("Salvo com sucesso!");
}
</script>

</body>
</html>
