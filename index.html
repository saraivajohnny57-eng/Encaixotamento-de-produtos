<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Sofisticatto</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}

body{
  background:#f5f2fb;
  display:flex;
  min-height:100vh;
  color:#4d4694;
}

.sidebar{
  width:250px;
  background:white;
  padding:25px;
  box-shadow:0 0 15px rgba(0,0,0,.08);
  display:none;
  flex-direction:column;
  justify-content:space-between;
}

.sidebar h2{
  font-size:38px;
  font-style:italic;
  font-weight:300;
  color:#5a4fa3;
  margin-bottom:10px;
}

.sidebar p{
  background:#ede9fb;
  padding:12px;
  border-radius:15px;
  margin-bottom:15px;
  font-size:14px;
}

.sidebar button{
  width:100%;
  margin-top:10px;
  background:#ede9fb;
  color:#4d4694;
  border:none;
  padding:14px;
  border-radius:15px;
  cursor:pointer;
  font-weight:bold;
}

.sidebar button:hover{
  background:#5a4fa3;
  color:white;
}

.main{
  flex:1;
  padding:30px;
  overflow:auto;
}

.card{
  background:white;
  padding:25px;
  border-radius:25px;
  box-shadow:0 0 15px rgba(0,0,0,.05);
  margin-bottom:25px;
}

.card h2{
  margin-bottom:20px;
  color:#5a4fa3;
}

.card h3{
  margin-top:25px;
  margin-bottom:15px;
  color:#5a4fa3;
}

input,select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:#f5f2fb;
  outline:none;
}

button{
  margin-top:10px;
  padding:12px 18px;
  cursor:pointer;
  border:none;
  border-radius:12px;
  background:#5a4fa3;
  color:white;
  font-weight:bold;
}

button:hover{
  opacity:.9;
}

.hidden{
  display:none!important;
}

.table-wrap{
  width:100%;
  overflow-x:auto;
}

table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
  min-width:760px;
}

th,td{
  border-bottom:1px solid #eee;
  padding:12px;
  text-align:left;
  vertical-align:middle;
}

th{
  background:#5a4fa3;
  color:white;
}

.resultado{
  margin-top:20px;
  font-weight:bold;
  color:#27ae60;
  font-size:18px;
  background:#edfdf3;
  padding:15px;
  border-radius:15px;
}

.login-container{
  position:fixed;
  inset:0;
  background:#f5f2fb;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  z-index:999;
}

.login-box{
  background:white;
  padding:40px;
  border-radius:30px;
  width:350px;
  max-width:100%;
  box-shadow:0 0 20px rgba(0,0,0,.08);
}

.login-box h1{
  text-align:center;
  font-size:42px;
  font-style:italic;
  font-weight:300;
  color:#5a4fa3;
}

.login-box p{
  text-align:center;
  letter-spacing:5px;
  color:#9c92d9;
  margin-bottom:25px;
  font-size:12px;
}

.login-box input{
  margin-bottom:10px;
}

.login-box button{
  width:100%;
  padding:15px;
  border-radius:15px;
}

.foto-box{
  width:120px;
  height:120px;
  border-radius:22px;
  background:#f5f2fb;
  border:2px dashed #b8afe6;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#5a4fa3;
  font-size:45px;
  cursor:pointer;
  overflow:hidden;
  margin-bottom:15px;
}

.foto-box img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.foto-area{
  display:flex;
  gap:20px;
  align-items:center;
  flex-wrap:wrap;
}

.foto-texto{
  color:#6b63aa;
  font-size:14px;
}

.thumb{
  width:55px;
  height:55px;
  border-radius:12px;
  object-fit:cover;
  background:#f5f2fb;
}

.sem-foto{
  width:55px;
  height:55px;
  border-radius:12px;
  background:#f5f2fb;
  color:#5a4fa3;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:25px;
}

.produto-imagem-grande{
  margin-top:20px;
  display:none;
  text-align:center;
}

.produto-imagem-grande img{
  max-width:100%;
  max-height:420px;
  border-radius:25px;
  box-shadow:0 0 15px rgba(0,0,0,.08);
}

.modal-foto{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:1000;
  padding:20px;
}

.modal-box{
  background:white;
  padding:25px;
  border-radius:25px;
  width:320px;
  max-width:100%;
  text-align:center;
}

.modal-box h3{
  color:#5a4fa3;
  margin-bottom:15px;
}

.modal-box button{
  width:100%;
}

@media(max-width:768px){
  body{display:block}

  .sidebar{
    width:100%;
    height:auto;
    padding:15px;
  }

  .sidebar h2{
    font-size:30px;
  }

  .main{
    padding:15px;
  }

  .card{
    padding:18px;
    border-radius:20px;
  }

  .sidebar button{
    padding:12px;
  }

  table{
    min-width:720px;
  }

  .login-box{
    padding:30px;
  }

  .login-box h1{
    font-size:34px;
  }
}
</style>
</head>

<body>

<div class="sidebar" id="menu">
  <div>
    <h2>Sofisticatto</h2>
    <p id="user-info"></p>

    <hr style="margin:15px 0;border:none;border-top:1px solid #eee;">

    <button onclick="irPara('consulta')">Consulta</button>
    <button onclick="irPara('cadastro')">Cadastro</button>
    <button id="btn-usuarios" onclick="irPara('usuarios')" style="display:none;">Usuários</button>
  </div>

  <button onclick="logout()">Sair</button>
</div>

<div class="main">

<div id="login" class="login-container">
  <div class="login-box">
    <h1>Sofisticatto</h1>
    <p>COSMÉTICOS</p>

    <input id="login-username" placeholder="Usuário">
    <input id="login-password" type="password" placeholder="Senha">

    <button onclick="fazerLogin()">Entrar</button>
  </div>
</div>

<div id="consulta" class="card hidden">
  <h2>Consulta</h2>

  <input id="busca" placeholder="Código">
  <input id="quantidade" placeholder="Quantidade">

  <button onclick="buscar()">Buscar</button>
  <button onclick="calcular()">Calcular</button>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Foto</th>
          <th>Código</th>
          <th>Descrição</th>
          <th>Nº Caixa</th>
          <th>Qtde/Caixa</th>
        </tr>
      </thead>
      <tbody id="tabela"></tbody>
    </table>
  </div>

  <div id="imagem-produto-grande" class="produto-imagem-grande"></div>

  <div id="resultado-calculo" class="resultado"></div>
</div>

<div id="cadastro" class="card hidden">
  <h2>Cadastro de Produto</h2>

  <div class="foto-area">
    <div class="foto-box" onclick="abrirOpcoesFoto()" id="preview-foto">
      +
    </div>

    <div class="foto-texto">
      Clique no quadro para tirar foto ou escolher da galeria.
    </div>
  </div>

  <input type="file" id="input-galeria" accept="image/*" class="hidden" onchange="selecionarImagem(event)">
  <input type="file" id="input-camera" accept="image/*" capture="environment" class="hidden" onchange="selecionarImagem(event)">

  <input id="produto-id" type="hidden">
  <input id="codigo" placeholder="Código">
  <input id="descricao" placeholder="Descrição">
  <input id="numero_caixa" placeholder="Número da Caixa">
  <input id="qtde_caixa" placeholder="Qtde por Caixa">

  <button onclick="salvar()">Salvar</button>
  <button onclick="limpar()">Novo</button>

  <h3>Lista de Produtos</h3>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Foto</th>
          <th>Código</th>
          <th>Descrição</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="lista-produtos"></tbody>
    </table>
  </div>
</div>

<div id="usuarios" class="card hidden">
  <h2>Usuários</h2>

  <input id="usuario-id" type="hidden">
  <input id="novo-user" placeholder="Usuário">
  <input id="nova-senha" placeholder="Senha">

  <select id="role">
    <option value="user">Usuário</option>
    <option value="admin">Admin</option>
  </select>

  <button onclick="salvarUsuario()">Salvar</button>
  <button onclick="limparUsuario()">Novo</button>

  <h3>Lista de Usuários</h3>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Usuário</th>
          <th>Tipo</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="lista-usuarios"></tbody>
    </table>
  </div>
</div>

</div>

<div id="modal-foto" class="modal-foto">
  <div class="modal-box">
    <h3>Adicionar foto</h3>
    <button onclick="abrirCamera()">📷 Tirar foto</button>
    <button onclick="abrirGaleria()">🖼️ Buscar na galeria</button>
    <button onclick="fecharOpcoesFoto()" style="background:#c0392b;">Cancelar</button>
  </div>
</div>

<script>
const supa = supabase.createClient(
  "https://gymyltthcegplqzbujrv.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5bXlsdHRoY2VncGxxemJ1anJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2OTg4NDcsImV4cCI6MjA5MjI3NDg0N30.mTIIKj1E6jMuAo1ZlQDAGOnNraXC5hjLQPqfHG6Aoaw"
);

let usuarioLogado = null;
let imagemSelecionada = null;
let imagemAtualUrl = "";

function irPara(secao) {
  if (!usuarioLogado) return;

  ["consulta","cadastro","usuarios"].forEach(s => {
    document.getElementById(s).classList.add("hidden");
  });

  document.getElementById(secao).classList.remove("hidden");

  if (secao === "cadastro") carregarLista();
  if (secao === "usuarios") carregarUsuarios();
}

async function fazerLogin() {
  const botao = document.querySelector(".login-box button");
  botao.disabled = true;
  botao.textContent = "Entrando...";

  const user = document.getElementById("login-username").value;
  const pass = document.getElementById("login-password").value;

  const { data, error } = await supa
    .from("usuarios")
    .select("*")
    .eq("username", user)
    .eq("senha", pass)
    .maybeSingle();

  botao.disabled = false;
  botao.textContent = "Entrar";

  if (error) {
    alert("Erro no login");
    console.log(error);
    return;
  }

  if (!data) {
    alert("Login inválido");
    return;
  }

  usuarioLogado = data;

  document.getElementById("login").classList.add("hidden");
  document.getElementById("menu").style.display = "flex";

  document.getElementById("user-info").textContent =
    "Logado: " + data.username;

  if (data.role === "admin") {
    document.getElementById("btn-usuarios").style.display = "block";
  }

  irPara("consulta");
}

function logout() {
  location.reload();
}

function abrirOpcoesFoto(){
  document.getElementById("modal-foto").style.display = "flex";
}

function fecharOpcoesFoto(){
  document.getElementById("modal-foto").style.display = "none";
}

function abrirGaleria(){
  fecharOpcoesFoto();
  document.getElementById("input-galeria").click();
}

function abrirCamera(){
  fecharOpcoesFoto();
  document.getElementById("input-camera").click();
}

function selecionarImagem(event){
  const arquivo = event.target.files[0];

  if(!arquivo) return;

  imagemSelecionada = arquivo;

  const urlTemporaria = URL.createObjectURL(arquivo);

  document.getElementById("preview-foto").innerHTML =
    <img src="${urlTemporaria}">;
}

async function uploadImagemProduto(){
  if(!imagemSelecionada){
    return imagemAtualUrl || "";
  }

  const extensao = imagemSelecionada.name.split(".").pop();
  const nomeArquivo = "produto_" + Date.now() + "_" + Math.random().toString(36).substring(2) + "." + extensao;

  const { error } = await supa.storage
    .from("produtos")
    .upload(nomeArquivo, imagemSelecionada, {
      cacheControl: "3600",
      upsert: true
    });

  if(error){
    console.log(error);
    alert("Erro ao enviar imagem");
    return imagemAtualUrl || "";
  }

  const { data } = supa.storage
    .from("produtos")
    .getPublicUrl(nomeArquivo);

  return data.publicUrl;
}

function miniatura(url){
  if(url){
    return <img class="thumb" src="${url}">;
  }

  return <div class="sem-foto">+</div>;
}

function mostrarImagemGrande(url){
  const box = document.getElementById("imagem-produto-grande");

  if(url){
    box.style.display = "block";
    box.innerHTML = <img src="${url}">;
  }else{
    box.style.display = "none";
    box.innerHTML = "";
  }
}

async function buscar() {
  const codigo = document.getElementById("busca").value;

  const { data, error } = await supa
    .from("produtos")
    .select("*")
    .eq("codigo", codigo);

  if (error) {
    console.log(error);
    alert("Erro ao buscar");
    return;
  }

  const tabela = document.getElementById("tabela");
  tabela.innerHTML = "";
  mostrarImagemGrande("");

  if (!data || data.length === 0) {
    tabela.innerHTML = "<tr><td colspan='5'>Nenhum resultado</td></tr>";
    return;
  }

  data.forEach(p => {
    tabela.innerHTML += `
      <tr>
        <td>${miniatura(p.imagem_url)}</td>
        <td>${p.codigo}</td>
        <td>${p.descricao}</td>
        <td>${p.numero_caixa}</td>
        <td>${p.qtde_caixa}</td>
      </tr>`;
  });

  mostrarImagemGrande(data[0].imagem_url);
}

async function calcular() {
  const codigo = document.getElementById("busca").value;
  const qtd = Number(document.getElementById("quantidade").value);

  const { data, error } = await supa
    .from("produtos")
    .select("*")
    .eq("codigo", codigo)
    .maybeSingle();

  if (error || !data) {
    alert("Produto não encontrado");
    return;
  }

  const caixas = Math.floor(qtd / data.qtde_caixa);
  const resto = qtd % data.qtde_caixa;

  let txt = caixas + " caixas";

  if (resto > 0) {
    txt += " + 1 aberta (" + resto + ")";
  }

  document.getElementById("resultado-calculo").textContent = txt;
  mostrarImagemGrande(data.imagem_url);
}

async function salvar() {
  const id = document.getElementById("produto-id").value;

  const imagemUrl = await uploadImagemProduto();

  const dados = {
    codigo: document.getElementById("codigo").value,
    descricao: document.getElementById("descricao").value,
    numero_caixa: document.getElementById("numero_caixa").value,
    qtde_caixa: document.getElementById("qtde_caixa").value,
    imagem_url: imagemUrl
  };

  let error;

  if (id) {
    ({ error } = await supa
      .from("produtos")
      .update(dados)
      .eq("id", id));
  } else {
    ({ error } = await supa
      .from("produtos")
      .insert([dados]));
  }

  if (error) {
    console.log(error);
    alert("Erro ao salvar produto");
    return;
  }

  alert("Produto salvo com sucesso!");
  limpar();
  carregarLista();
}

async function carregarLista() {
  const { data, error } = await supa
    .from("produtos")
    .select("*")
    .order("id", { ascending: false });

  if (error) {
    console.log(error);
    return;
  }

  const lista = document.getElementById("lista-produtos");
  lista.innerHTML = "";

  data.forEach(p => {
    lista.innerHTML += `
      <tr>
        <td>${miniatura(p.imagem_url)}</td>
        <td>${p.codigo}</td>
        <td>${p.descricao}</td>
        <td>
          <button onclick="editar(${p.id})">Editar</button>
          <button onclick="excluir(${p.id})">Excluir</button>
        </td>
      </tr>`;
  });
}

async function editar(id) {
  const { data } = await supa
    .from("produtos")
    .select("*")
    .eq("id", id)
    .maybeSingle();

  document.getElementById("produto-id").value = data.id;
  document.getElementById("codigo").value = data.codigo;
  document.getElementById("descricao").value = data.descricao;
  document.getElementById("numero_caixa").value = data.numero_caixa;
  document.getElementById("qtde_caixa").value = data.qtde_caixa;

  imagemAtualUrl = data.imagem_url || "";
  imagemSelecionada = null;

  if(imagemAtualUrl){
    document.getElementById("preview-foto").innerHTML =
      <img src="${imagemAtualUrl}">;
  }else{
    document.getElementById("preview-foto").innerHTML = "+";
  }
}

async function excluir(id) {
  if (!confirm("Excluir produto?")) return;

  const { error } = await supa
    .from("produtos")
    .delete()
    .eq("id", id);

  if (error) {
    console.log(error);
    alert("Erro ao excluir produto");
    return;
  }

  carregarLista();
}

function limpar() {
  document.getElementById("produto-id").value = "";
  document.getElementById("codigo").value = "";
  document.getElementById("descricao").value = "";
  document.getElementById("numero_caixa").value = "";
  document.getElementById("qtde_caixa").value = "";

  imagemSelecionada = null;
  imagemAtualUrl = "";

  document.getElementById("input-galeria").value = "";
  document.getElementById("input-camera").value = "";
  document.getElementById("preview-foto").innerHTML = "+";
}

async function carregarUsuarios() {
  const { data, error } = await supa
    .from("usuarios")
    .select("*")
    .order("id", { ascending: false });

  if (error) {
    console.log(error);
    return;
  }

  const lista = document.getElementById("lista-usuarios");
  lista.innerHTML = "";

  data.forEach(u => {
    lista.innerHTML += `
      <tr>
        <td>${u.username}</td>
        <td>${u.role}</td>
        <td>
          <button onclick="editarUsuario(${u.id})">Editar</button>
          <button onclick="excluirUsuario(${u.id})">Excluir</button>
        </td>
      </tr>`;
  });
}

async function salvarUsuario() {
  const id = document.getElementById("usuario-id").value;

  const dados = {
    username: document.getElementById("novo-user").value,
    senha: document.getElementById("nova-senha").value,
    role: document.getElementById("role").value
  };

  let error;

  if (id) {
    ({ error } = await supa
      .from("usuarios")
      .update(dados)
      .eq("id", id));
  } else {
    ({ error } = await supa
      .from("usuarios")
      .insert([dados]));
  }

  if (error) {
    console.log(error);
    alert("Erro ao salvar usuário");
    return;
  }

  alert("Usuário salvo com sucesso!");
  limparUsuario();
  carregarUsuarios();
}

async function editarUsuario(id) {
  const { data } = await supa
    .from("usuarios")
    .select("*")
    .eq("id", id)
    .maybeSingle();

  document.getElementById("usuario-id").value = data.id;
  document.getElementById("novo-user").value = data.username;
  document.getElementById("nova-senha").value = data.senha;
  document.getElementById("role").value = data.role;
}

async function excluirUsuario(id) {
  if (!confirm("Excluir usuário?")) return;

  const { error } = await supa
    .from("usuarios")
    .delete()
    .eq("id", id);

  if (error) {
    console.log(error);
    alert("Erro ao excluir usuário");
    return;
  }

  carregarUsuarios();
}

function limparUsuario() {
  document.getElementById("usuario-id").value = "";
  document.getElementById("novo-user").value = "";
  document.getElementById("nova-senha").value = "";
  document.getElementById("role").value = "user";
}
</script>

</body>
</html>
