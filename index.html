<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sofisticatto</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6a1b9a">

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; background:#f5f5f5; margin:0; }
header { text-align:center; padding:20px; background:#fff; }
.container { max-width:900px; margin:20px auto; background:#fff; padding:20px; border-radius:8px; }
button { width:100%; padding:10px; margin-top:8px; border:none; background:#6a1b9a; color:#fff; }
.secondary { background:#777; }
.danger { background:#c62828; }
.hidden { display:none; }
input,select { width:100%; padding:10px; margin-top:5px; }
table { width:100%; margin-top:10px; border-collapse:collapse; }
td,th { border:1px solid #ddd; padding:6px; }
</style>
</head>

<body>

<header><h2>Sofisticatto</h2></header>

<!-- LOGIN -->
<div class="container" id="login">
<h3>Login</h3>
<input id="user">
<input id="pass" type="password">
<button onclick="login()">Entrar</button>
<p id="msg"></p>
</div>

<!-- MENU -->
<div class="container hidden" id="menu">
<h3 id="info"></h3>

<button onclick="ir('consulta')">Consulta</button>
<button onclick="ir('cadastro')">Cadastro Produto</button>
<button id="btnUsers" onclick="ir('usuarios')" class="secondary">Usuários</button>
<button onclick="logout()" class="secondary">Sair</button>
</div>

<!-- CONSULTA -->
<div class="container hidden" id="consulta">
<h3>Consulta</h3>

<input id="buscaCodigo" placeholder="Código">
<input id="buscaQtd" placeholder="Quantidade">

<button onclick="buscar()">Buscar</button>

<table>
<thead>
<tr><th>Código</th><th>Descrição</th><th>Caixa</th><th>Qtde</th><th>Resultado</th></tr>
</thead>
<tbody id="res"></tbody>
</table>

<button onclick="ir('menu')">Voltar</button>
</div>

<!-- CADASTRO -->
<div class="container hidden" id="cadastro">
<h3>Cadastro Produto</h3>

<input id="idProd" type="hidden">
<input id="codigo" placeholder="Código">
<input id="descricao" placeholder="Descrição">
<input id="caixa" placeholder="Número caixa">
<input id="qtde" placeholder="Qtde por caixa">

<button onclick="salvar()">Salvar</button>
<button onclick="listarProdutos()">Listar</button>

<table>
<tbody id="listaProd"></tbody>
</table>

<button onclick="ir('menu')">Voltar</button>
</div>

<!-- USUÁRIOS -->
<div class="container hidden" id="usuarios">
<h3>Usuários</h3>

<input id="idUser" type="hidden">
<input id="novoUser" placeholder="Usuário">
<input id="novaSenha" placeholder="Senha">
<select id="role">
<option value="user">Usuário</option>
<option value="admin">Admin</option>
</select>

<button onclick="salvarUser()">Salvar</button>
<button onclick="listarUsers()">Listar</button>

<table>
<tbody id="listaUsers"></tbody>
</table>

<button onclick="ir('menu')">Voltar</button>
</div>

<script>
const supa = supabase.createClient(
"https://gymyltthcegplqzbujrv.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5bXlsdHRoY2VncGxxemJ1anJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2OTg4NDcsImV4cCI6MjA5MjI3NDg0N30.mTIIKj1E6jMuAo1ZlQDAGOnNraXC5hjLQPqfHG6Aoaw"
);

let userLogado = null;

// NAVEGAÇÃO
function ir(sec){
["login","menu","consulta","cadastro","usuarios"].forEach(i=>{
document.getElementById(i).classList.add("hidden");
});
document.getElementById(sec).classList.remove("hidden");
}

// LOGIN
async function login(){
const {data} = await supa
.from("usuarios")
.select("*")
.eq("username",user.value.trim())
.eq("senha",pass.value.trim())
.maybeSingle();

if(!data){ msg.innerText="Login inválido"; return; }

userLogado=data;
info.innerText=Logado: ${data.username} (${data.role});

btnUsers.style.display = data.role=="admin"?"block":"none";

ir("menu");
}

// LOGOUT
function logout(){
userLogado=null;
ir("login");
}

// CONSULTA
async function buscar(){
const {data} = await supa.from("produtos")
.select("*")
.eq("codigo",buscaCodigo.value);

if(!data.length){ alert("Não encontrado"); return;}

let p=data[0];
let qtd=parseInt(buscaQtd.value||0);
let resul="";

if(qtd){
let cx=Math.floor(qtd/p.qtde_caixa);
let resto=qtd%p.qtde_caixa;
resul=${cx} cx + ${resto} un;
}

res.innerHTML=`
<tr>
<td>${p.codigo}</td>
<td>${p.descricao}</td>
<td>${p.numero_caixa}</td>
<td>${p.qtde_caixa}</td>
<td>${resul}</td>
</tr>`;
}

// SALVAR PRODUTO
async function salvar(){
if(idProd.value){
await supa.from("produtos").update({
codigo:codigo.value,
descricao:descricao.value,
numero_caixa:caixa.value,
qtde_caixa:qtde.value
}).eq("id",idProd.value);
}else{
await supa.from("produtos").insert({
codigo:codigo.value,
descricao:descricao.value,
numero_caixa:caixa.value,
qtde_caixa:qtde.value
});
}

alert("Salvo!");
listarProdutos();
}

// LISTAR PRODUTOS
async function listarProdutos(){
const {data}=await supa.from("produtos").select("*");

listaProd.innerHTML="";
data.forEach(p=>{
listaProd.innerHTML+=`
<tr>
<td>${p.codigo}</td>
<td>${p.descricao}</td>
<td>${p.numero_caixa}</td>
<td>${p.qtde_caixa}</td>
<td>
<button onclick="editarProd(${p.id})">Editar</button>
<button onclick="excluirProd(${p.id})" class="danger">Excluir</button>
</td>
</tr>`;
});
}

// EDITAR PRODUTO
async function editarProd(id){
const {data}=await supa.from("produtos").select("*").eq("id",id).single();

idProd.value=data.id;
codigo.value=data.codigo;
descricao.value=data.descricao;
caixa.value=data.numero_caixa;
qtde.value=data.qtde_caixa;
}

// EXCLUIR PRODUTO
async function excluirProd(id){
if(!confirm("Excluir?")) return;

await supa.from("produtos").delete().eq("id",id);
listarProdutos();
}

// USUÁRIOS
async function salvarUser(){
if(idUser.value){
await supa.from("usuarios").update({
username:novoUser.value,
senha:novaSenha.value,
role:role.value
}).eq("id",idUser.value);
}else{
await supa.from("usuarios").insert({
username:novoUser.value,
senha:novaSenha.value,
role:role.value
});
}

alert("Salvo!");
listarUsers();
}

async function listarUsers(){
const {data}=await supa.from("usuarios").select("*");

listaUsers.innerHTML="";
data.forEach(u=>{
listaUsers.innerHTML+=`
<tr>
<td>${u.username}</td>
<td>${u.role}</td>
<td>
<button onclick="editarUser(${u.id})">Editar</button>
<button onclick="excluirUser(${u.id})" class="danger">Excluir</button>
</td>
</tr>`;
});
}

async function editarUser(id){
const {data}=await supa.from("usuarios").select("*").eq("id",id).single();

idUser.value=data.id;
novoUser.value=data.username;
novaSenha.value=data.senha;
role.value=data.role;
}

async function excluirUser(id){
if(!confirm("Excluir?")) return;

await supa.from("usuarios").delete().eq("id",id);
listarUsers();
}

ir("login");
</script>

</body>
</html>
