<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Sofisticatto</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#f5f2fb;
  display:flex;
  min-height:100vh;
  color:#4d4694;
}

.sidebar{
  width:250px;
  background:white;
  padding:25px;
  box-shadow:0 0 15px rgba(0,0,0,.08);
  display:none;
  flex-direction:column;
  justify-content:space-between;
}

.sidebar h2{
  font-size:38px;
  font-style:italic;
  font-weight:300;
  color:#5a4fa3;
  margin-bottom:10px;
}

.sidebar p{
  background:#ede9fb;
  padding:12px;
  border-radius:15px;
  margin-bottom:15px;
  font-size:14px;
}

.sidebar button{
  width:100%;
  margin-top:10px;
  background:#ede9fb;
  color:#4d4694;
  border:none;
  padding:14px;
  border-radius:15px;
  cursor:pointer;
  transition:.2s;
  font-weight:bold;
}

.sidebar button:hover{
  background:#5a4fa3;
  color:white;
}

.main{
  flex:1;
  padding:30px;
  overflow:auto;
}

.card{
  background:white;
  padding:25px;
  border-radius:25px;
  box-shadow:0 0 15px rgba(0,0,0,.05);
  margin-bottom:25px;
}

.card h2{
  margin-bottom:20px;
  color:#5a4fa3;
}

.card h3{
  margin-top:25px;
  margin-bottom:15px;
  color:#5a4fa3;
}

input,select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:#f5f2fb;
  outline:none;
}

button{
  margin-top:10px;
  padding:12px 18px;
  cursor:pointer;
  border:none;
  border-radius:12px;
  background:#5a4fa3;
  color:white;
  font-weight:bold;
  transition:.2s;
}

button:hover{
  opacity:.9;
}

.hidden{
  display:none;
}

.table-wrap{
  width:100%;
  overflow-x:auto;
}

table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
  min-width:700px;
}

th,td{
  border-bottom:1px solid #eee;
  padding:12px;
  text-align:left;
}

th{
  background:#5a4fa3;
  color:white;
}

.resultado{
  margin-top:20px;
  font-weight:bold;
  color:#27ae60;
  font-size:18px;
  background:#edfdf3;
  padding:15px;
  border-radius:15px;
}

.login-container{
  position:fixed;
  inset:0;
  background:#f5f2fb;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.login-box{
  background:white;
  padding:40px;
  border-radius:30px;
  width:350px;
  max-width:100%;
  box-shadow:0 0 20px rgba(0,0,0,.08);
}

.login-box h1{
  text-align:center;
  font-size:42px;
  font-style:italic;
  font-weight:300;
  color:#5a4fa3;
}

.login-box p{
  text-align:center;
  letter-spacing:5px;
  color:#9c92d9;
  margin-bottom:25px;
  font-size:12px;
}

.login-box input{
  margin-bottom:10px;
}

.login-box button{
  width:100%;
  padding:15px;
  border-radius:15px;
}

@media(max-width:768px){
body{
  display:block;
}

.sidebar{
  width:100%;
  height:auto;
  padding:15px;
}

.sidebar h2{
  font-size:30px;
}

.main{
  padding:15px;
}

.card{
  padding:18px;
  border-radius:20px;
}

.sidebar button{
  padding:12px;
}

table{
  min-width:650px;
}

.login-box{
  padding:30px;
}

.login-box h1{
  font-size:34px;
}
}
</style>
</head>

<body>

<div class="sidebar" id="menu">
  <div>
    <h2>Sofisticatto</h2>
    <p id="user-info"></p>

    <hr style="margin:15px 0;border:none;border-top:1px solid #eee;">

    <button onclick="irPara('consulta')">Consulta</button>
    <button onclick="irPara('cadastro')">Cadastro</button>
    <button id="btn-usuarios" onclick="irPara('usuarios')" style="display:none;">Usuários</button>
  </div>

  <button onclick="logout()">Sair</button>
</div>

<div class="main">

<div id="login" class="login-container">
  <div class="login-box">

    <h1>Sofisticatto</h1>
    <p>COSMÉTICOS</p>

    <input id="login-username" placeholder="Usuário">
    <input id="login-password" type="password" placeholder="Senha">

    <button onclick="login()">Entrar</button>

  </div>
</div>

<div id="consulta" class="card hidden">
  <h2>Consulta</h2>

  <input id="busca" placeholder="Código">
  <input id="quantidade" placeholder="Quantidade">

  <button onclick="buscar()">Buscar</button>
  <button onclick="calcular()">Calcular</button>

  <div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Código</th>
        <th>Descrição</th>
        <th>Nº Caixa</th>
        <th>Qtde/Caixa</th>
      </tr>
    </thead>
    <tbody id="tabela"></tbody>
  </table>
  </div>

  <div id="resultado-calculo" class="resultado"></div>
</div>

<div id="cadastro" class="card hidden">
  <h2>Cadastro de Produto</h2>

  <input id="produto-id" type="hidden">
  <input id="codigo" placeholder="Código">
  <input id="descricao" placeholder="Descrição">
  <input id="numero_caixa" placeholder="Número da Caixa">
  <input id="qtde_caixa" placeholder="Qtde por Caixa">

  <button onclick="salvar()">Salvar</button>
  <button onclick="limpar()">Novo</button>

  <h3>Lista de Produtos</h3>

  <div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Código</th>
        <th>Descrição</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody id="lista-produtos"></tbody>
  </table>
  </div>
</div>

<div id="usuarios" class="card hidden">
  <h2>Usuários</h2>

  <input id="usuario-id" type="hidden">
  <input id="novo-user" placeholder="Usuário">
  <input id="nova-senha" placeholder="Senha">

  <select id="role">
    <option value="user">Usuário</option>
    <option value="admin">Admin</option>
  </select>

  <button onclick="salvarUsuario()">Salvar</button>
  <button onclick="limparUsuario()">Novo</button>

  <h3>Lista de Usuários</h3>

  <div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Usuário</th>
        <th>Tipo</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody id="lista-usuarios"></tbody>
  </table>
  </div>
</div>

</div>

<script>
const supa = supabase.createClient(
  "https://gymyltthcegplqzbujrv.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5bXlsdHRoY2VncGxxemJ1anJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2OTg4NDcsImV4cCI6MjA5MjI3NDg0N30.mTIIKj1E6jMuAo1ZlQDAGOnNraXC5hjLQPqfHG6Aoaw"
);

let usuarioLogado = null;

function irPara(secao) {
  if (!usuarioLogado) return;

  ["consulta","cadastro","usuarios"].forEach(s => {
    document.getElementById(s).classList.add("hidden");
  });

  document.getElementById(secao).classList.remove("hidden");

  if (secao === "cadastro") carregarLista();
  if (secao === "usuarios") carregarUsuarios();
}

async function login() {
  const user = document.getElementById("login-username").value;
  const pass = document.getElementById("login-password").value;

  const { data, error } = await supa
    .from("usuarios")
    .select("*")
    .eq("username", user)
    .eq("senha", pass)
    .maybeSingle();

  if (error) {
    alert("Erro no login");
    console.log(error);
    return;
  }

  if (!data) {
    alert("Login inválido");
    return;
  }

  usuarioLogado = data;

  document.getElementById("login").classList.add("hidden");
  document.getElementById("menu").style.display = "flex";

  document.getElementById("user-info").textContent =
    "Logado: " + data.username;

  if (data.role === "admin") {
    document.getElementById("btn-usuarios").style.display = "block";
  }

  irPara('consulta');
}

function logout() {
  location.reload();
}
</script>

</body>
</html>
