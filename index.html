<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema Sofisticatto</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; background:#f5f5f5; margin:0; }
header { text-align:center; padding:20px; background:#fff; border-bottom:1px solid #ddd; }
.logo { font-size:24px; color:#6a1b9a; font-weight:bold; }

.container {
  max-width:900px;
  margin:20px auto;
  background:#fff;
  padding:20px;
  border-radius:8px;
}

button {
  margin-top:10px;
  padding:8px 15px;
  border:none;
  background:#6a1b9a;
  color:white;
  cursor:pointer;
  border-radius:4px;
}

.secondary { background:#777; }
.hidden { display:none; }

table { width:100%; margin-top:10px; border-collapse:collapse; }
td, th { border:1px solid #ddd; padding:6px; }

.msg { color:red; margin-top:10px; }
.ok { color:green; }
</style>
</head>

<body>

<header>
  <div class="logo">Sofisticatto</div>
  <div>Sistema de Produtos</div>
</header>

<!-- LOGIN -->
<div class="container" id="login-section">
  <h2>Login</h2>
  <input id="login-username" placeholder="Usuário"><br>
  <input id="login-password" type="password" placeholder="Senha"><br>
  <button id="btn-login">Entrar</button>
  <div id="login-msg" class="msg"></div>
</div>

<!-- MENU -->
<div class="container hidden" id="menu-section">
  <h2>Menu</h2>
  <p id="user-info"></p>

  <button onclick="irPara('consulta-section')">Consulta</button>
  <button onclick="irPara('cadastro-produto-section')">Cadastro Produto</button>
  <button onclick="irPara('usuarios-section')" id="btn-usuarios">Usuários</button>
  <button onclick="logout()" class="secondary">Sair</button>
</div>

<!-- CONSULTA -->
<div class="container hidden" id="consulta-section">
  <h2>Consulta</h2>
  <input id="busca">
  <button onclick="buscar()">Buscar</button>

  <table>
    <tbody id="tabela"></tbody>
  </table>

  <button onclick="irPara('menu-section')">Voltar</button>
</div>

<!-- CADASTRO PRODUTO -->
<div class="container hidden" id="cadastro-produto-section">
  <h2>Cadastro Produto</h2>

  <input id="codigo" placeholder="Código"><br>
  <input id="descricao" placeholder="Descrição"><br>

  <button onclick="salvarProduto()">Salvar</button>
  <button onclick="irPara('menu-section')">Voltar</button>
</div>

<!-- USUÁRIOS -->
<div class="container hidden" id="usuarios-section">
  <h2>Usuários</h2>

  <input id="novo-user" placeholder="Usuário"><br>
  <input id="nova-senha" placeholder="Senha"><br>

  <select id="role">
    <option value="user">Usuário</option>
    <option value="admin">Admin</option>
  </select><br>

  <button onclick="criarUsuario()">Criar</button>
  <button onclick="irPara('menu-section')">Voltar</button>
</div>

<script>
const supa = supabase.createClient(
  "https://gymyltthcegplqzbujrv.supabase.co",
  "sb_publishable_yiTEjwaD0gPFz3nHb22bJQ_kTa-DWjS"
);

let usuarioLogado = null;

// NAVEGAÇÃO
function irPara(secao) {
  ["login-section","menu-section","consulta-section","cadastro-produto-section","usuarios-section"]
  .forEach(s => document.getElementById(s).classList.add("hidden"));

  document.getElementById(secao).classList.remove("hidden");
}

// LOGIN
document.getElementById("btn-login").onclick = async () => {
  const user = document.getElementById("login-username").value.trim();
  const pass = document.getElementById("login-password").value.trim();

  const { data } = await supa
    .from("usuarios")
    .select("*")
    .ilike("username", user)
    .eq("senha", pass)
    .maybeSingle();

  if (!data) {
    document.getElementById("login-msg").textContent = "Usuário ou senha inválidos";
    return;
  }

  usuarioLogado = data;

  document.getElementById("user-info").textContent =
  `Logado como: ${data.username} (${data.role})`;

  // controle admin
  if (data.role === "admin") {
    document.getElementById("btn-usuarios").style.display = "inline-block";
  } else {
    document.getElementById("btn-usuarios").style.display = "none";
  }

  irPara("menu-section");
};

// LOGOUT
function logout() {
  usuarioLogado = null;
  irPara("login-section");
}

// CONSULTA
async function buscar() {
  const { data } = await supa.from("produtos").select("*");

  const tabela = document.getElementById("tabela");
  tabela.innerHTML = "";

  data.forEach(p => {
    tabela.innerHTML += `
      <tr>
        <td>${p.id}</td>
        <td>${p.codigo}</td>
        <td>${p.descricao}</td>
      </tr>
    `;
  });
}

// CADASTRO PRODUTO
async function salvarProduto() {
  await supa.from("produtos").insert({
    codigo: document.getElementById("codigo").value,
    descricao: document.getElementById("descricao").value
  });

  alert("Produto salvo!");
}

// USUÁRIO
async function criarUsuario() {
  await supa.from("usuarios").insert({
    username: document.getElementById("novo-user").value,
    senha: document.getElementById("nova-senha").value,
    role: document.getElementById("role").value
  });

  alert("Usuário criado!");
}

// INÍCIO
irPara("login-section");
</script>

</body>
</html>
